# =============================================================================
# Render Blueprint for LeaderShape - Static Site Deployment
# =============================================================================
# Documentation: https://render.com/docs/blueprint-spec
#
# Deployment Instructions:
# 1. Connect your GitHub repository to Render.com
# 2. Create a new "Blueprint" and point to this render.yaml
# 3. Deploy! No environment variables required for this static site.
#
# Manual Deployment:
#   render blueprint apply
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Static Site - Vite + Alpine.js Application
  # ---------------------------------------------------------------------------
  - type: web
    name: leadershape
    runtime: static
    plan: free
    region: oregon
    branch: main

    # Auto-deploy on push to main branch
    autoDeploy: true

    # Build Configuration
    buildCommand: npm ci && npm run build

    # Static files location (Vite outputs to dist/)
    staticPublishPath: ./dist

    # SPA routing - redirect all paths to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Headers for security and caching
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    # Environment Variables (build-time only for static sites)
    envVars:
      - key: NODE_VERSION
        value: "22"

      - key: NODE_ENV
        value: production
